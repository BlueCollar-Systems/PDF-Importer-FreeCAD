name: auto-release

on:
  push:
    branches: [main]
    # Docs-only pushes do not mint a release (board Q-08-a / ANS-09-1).
    # Release-pipeline workflow edits under .github/ are NOT ignored: they must
    # rebuild --latest assets. The job if: guard skips chore: bump version to
    # commits, so there is no release loop.
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "_archived/**"
      - "dist/_archived/**"
      - "dev_logs/**"
      - "steel_shapes/**"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    shell: bash

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  version-build-release:
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version to') && !contains(github.event.head_commit.message, 'automation/version-bump') && !contains(github.event.head_commit.message, '[skip release]')"
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true
          # GITHUB_TOKEN always authenticates checkout; RELEASE_BUMP_TOKEN is used
          # only when pushing the version-bump commit past branch protection.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install release gate dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "PyMuPDF>=1.24,<2.0" pytest

      - name: Run release gate tests
        run: |
          python pdfcadcore_sync_check.py --skip-cross-repo
          python -m compileall PDFVectorImporter
          # Vendor the bundled PyMuPDF into src/lib BEFORE the gate: tests such as
          # test_diagnostics_reports_bundled_pymupdf require the bundled runtime,
          # and src/lib is gitignored/empty on a fresh checkout (vendoring otherwise
          # only happens later in build_release.py). Idempotent - build reuses it.
          python -c "import build_release; build_release.ensure_runtime_dependencies()"
          python -m pytest tests/ -q --basetemp "$RUNNER_TEMP/pytest-freecad"

      - name: Read committed version
        id: version
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re

          package_xml = pathlib.Path("PDFVectorImporter/package.xml")
          package_text = package_xml.read_text(encoding="utf-8")

          match = re.search(r"<version>(\d+\.\d+\.\d+)</version>", package_text)
          if not match:
              raise SystemExit("Could not find <version> in PDFVectorImporter/package.xml")
          version = match.group(1)

          pyproject_text = pathlib.Path("pyproject.toml").read_text(encoding="utf-8")
          pyproject_match = re.search(r'^version\s*=\s*"(\d+\.\d+\.\d+)"', pyproject_text, re.MULTILINE)
          if not pyproject_match or pyproject_match.group(1) != version:
              got = pyproject_match.group(1) if pyproject_match else "missing"
              raise SystemExit(f"Version mismatch: package={version} pyproject={got}")

          for readme in [pathlib.Path("README.md"), pathlib.Path("PDFVectorImporter/README.md")]:
              readme_text = readme.read_text(encoding="utf-8")
              badge_match = re.search(r"Version-(\d+\.\d+\.\d+)-(?:green|blue)\.svg", readme_text)
              if not badge_match or badge_match.group(1) != version:
                  got = badge_match.group(1) if badge_match else "missing"
                  raise SystemExit(f"Version mismatch: package={version} {readme}={got}")

          out = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          out.write_text(f"version={version}\n", encoding="utf-8")
          PY

      - name: Set release target
        run: |
          echo "RELEASE_TARGET=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Build release zip
        run: python build_release.py

      - name: Smoke release zip dependency payload
        run: python scripts/smoke_release_zip.py "FreeCAD-PDF-Importer_v*.zip"

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          VERSION="v${{ steps.version.outputs.version }}"
          ZIP="FreeCAD-PDF-Importer_v${{ steps.version.outputs.version }}.zip"

          if gh release view "${VERSION}" >/dev/null 2>&1; then
            echo "Release ${VERSION} already exists — skipping."
            exit 0
          fi
          # Create the tag via the gh/releases API (GITHUB_TOKEN), NOT `git push
          # origin <tag>`: the checkout PAT lacks `workflow` scope, so pushing a
          # tag whose commit touches .github/workflows/ is rejected. gh creates
          # the tag at the target commit through the API, which is not subject to
          # that restriction.
          gh release create "${VERSION}" \
            --target "${RELEASE_TARGET:-$GITHUB_SHA}" \
            --title "${VERSION} — PDF Vector Importer for FreeCAD" \
            --notes "Automated release from latest \`main\` commit.

          **Install:** Download \`${ZIP}\` below, extract into your FreeCAD Mod folder, and restart FreeCAD. Or install via **Tools > Addon Manager**." \
            --latest \
            "${ZIP}"

      - name: Check website dispatch token secret
        id: website_dispatch_token
        env:
          WEBSITE_DISPATCH_TOKEN: ${{ secrets.WEBSITE_DISPATCH_TOKEN || secrets.BLUECOLLAR_WEBSITE_DISPATCH_TOKEN || secrets.REPO_DISPATCH_TOKEN }}
        run: |
          if [ -n "$WEBSITE_DISPATCH_TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch website release update
        if: steps.website_dispatch_token.outputs.has_token == 'true'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.WEBSITE_DISPATCH_TOKEN || secrets.BLUECOLLAR_WEBSITE_DISPATCH_TOKEN || secrets.REPO_DISPATCH_TOKEN }}
          script: |
            const tag = 'v${{ steps.version.outputs.version }}';
            const payload = {
              source_repo: context.repo.owner + '/' + context.repo.repo,
              source_event: 'auto-release',
              source_ref: context.ref,
              source_sha: context.sha,
              release_tag: tag,
              release_name: tag,
              release_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/tag/${tag}`,
            };

            await github.request('POST /repos/{owner}/{repo}/dispatches', {
              owner: 'BlueCollar-Systems',
              repo: 'BlueCollar-Website',
              event_type: 'product-release',
              client_payload: payload,
            });

            core.info('Dispatched product-release to BlueCollar-Website');

      - name: Warn when website dispatch token is missing
        if: steps.website_dispatch_token.outputs.has_token != 'true'
        run: |
          echo "::warning::Skipping website dispatch because no valid dispatch token secret is configured."
          echo "Set WEBSITE_DISPATCH_TOKEN (or BLUECOLLAR_WEBSITE_DISPATCH_TOKEN / REPO_DISPATCH_TOKEN) to enable cross-repo dispatch."
